version: "3.8"

services:

  redis:
    image: redis:7-alpine
    container_name: askpolicy_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: askpolicy_api
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents
      - ./chroma_db:/app/chroma_db
      - ./templates:/app/templates
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  redis_data: