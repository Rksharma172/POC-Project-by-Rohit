vectordb:
  persist_directory: "./chroma_db"
  collection_name: "policy_documents"

embeddings:
  provider: "bge"
  model: "BAAI/bge-small-en-v1.5"
  batch_size: 32

chunking:
  strategy: "semantic"
  chunk_size: 512
  chunk_overlap: 50
  min_chunk_size: 100

cache:
  # host: "redis"  # For running using docker 
  host: "localhost"          # changed from "redis" to "localhost"
  port: 6379
  ttl_seconds: 3600
  embedding_ttl: 86400
