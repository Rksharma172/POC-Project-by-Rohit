vectordb:
  persist_directory: "./chroma_db"
  collection_name: "policy_documents"

embeddings:
  provider: "bge"
  model: "BAAI/bge-small-en-v1.5"
  batch_size: 32

chunking:
  strategy: "semantic"
  chunk_size: 900
  chunk_overlap: 120
  min_chunk_size: 180

  # Used by embedding-based semantic chunking
  semantic_breakpoint_percentile: 15
  semantic_min_similarity: 0.45

retrieval:
  top_k: 5
  candidate_k: 24
  vector_weight: 0.68
  lexical_weight: 0.32

  # Chroma cosine distance: lower = more relevant.
  # Start with 0.95 and tune later from logs.
  max_distance: 0.95

generation:
  answer_model: "qwen2.5:7b"
  suggestion_model: "qwen2.5:7b"

cache:
  host: "${REDIS_HOST:localhost}"
  port: 6379
  ttl_seconds: 3600
  embedding_ttl: 86400

security:
  # Demo-only accounts for local testing and per-user document separation.
  # For deployment, override these with environment variables or replace this
  # lightweight auth with database-backed users and hashed passwords.
  demo_users:
    hr: "hr-demo"
    finance: "finance-demo"
    admin: "admin-demo"
