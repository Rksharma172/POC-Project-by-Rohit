<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskPolicy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 800px;
            height: 90vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 22px; }
        .header p  { font-size: 13px; opacity: 0.8; margin-top: 5px; }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user-message {
            background: #2563eb;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .bot-message {
            background: #f1f5f9;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .loading-message {
            background: #f1f5f9;
            color: #94a3b8;
            align-self: flex-start;
            font-style: italic;
        }

        .sources {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }

        .welcome {
            text-align: center;
            color: #94a3b8;
            margin: auto;
        }
        .welcome h2 { font-size: 20px; margin-bottom: 10px; }
        .welcome p  { font-size: 14px; }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .suggestion-btn {
            padding: 8px 14px;
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .suggestion-btn:hover {
            background: #dbeafe;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #2563eb;
        }

        .input-area button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .input-area button:hover { background: #1d4ed8; }
        .input-area button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🏢 AskPolicy</h1>
        <p>Internal Policy Q&A — Powered by RAG + Qwen 2.5</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="welcome" id="welcome">
            <h2>👋 Hello! Ask me anything</h2>
            <p>I can answer questions about company policies</p>
            <div class="suggestions">
                <button class="suggestion-btn"
                    onclick="askSuggestion('What is the leave policy?')">
                    🌴 Leave Policy
                </button>
                <button class="suggestion-btn"
                    onclick="askSuggestion('What are travel expense limits?')">
                    ✈️ Travel Expenses
                </button>
                <button class="suggestion-btn"
                    onclick="askSuggestion('What is the work from home policy?')">
                    🏠 Work From Home
                </button>
                <button class="suggestion-btn"
                    onclick="askSuggestion('What are the office timings?')">
                    🕐 Office Timings
                </button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="questionInput"
            placeholder="Ask about company policies..."
            onkeypress="handleKeyPress(event)"
        />
        <button id="sendBtn" onclick="askQuestion()">Send ➤</button>
    </div>

</div>

<script>
    const API_URL = "http://localhost:8000";

    function handleKeyPress(e) {
        if (e.key === "Enter") askQuestion();
    }

    function askSuggestion(question) {
        document.getElementById("questionInput").value = question;
        askQuestion();
    }

    async function askQuestion() {
        const input = document.getElementById("questionInput");
        const question = input.value.trim();
        if (!question) return;

        input.value = "";

        // Remove welcome
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();

        // Show user message
        addMessage(question, "user");

        // Show loading
        const loadingId = addMessage("⏳ Searching documents and generating answer...", "loading");

        // Disable button
        const btn = document.getElementById("sendBtn");
        btn.disabled = true;
        btn.textContent = "...";

        try {
            const response = await fetch(`${API_URL}/ask`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question })
            });

            const data = await response.json();
            removeMessage(loadingId);
            addBotMessage(data.answer, data.sources);

        } catch (error) {
            removeMessage(loadingId);
            addMessage(
                "❌ Cannot connect to server. Make sure API is running on port 8000.",
                "bot"
            );
        }

        btn.disabled = false;
        btn.textContent = "Send ➤";
        input.focus();
    }

    function addMessage(text, type) {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");
        const id = "msg_" + Date.now();
        div.id = id;
        div.className = `message ${type}-message`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }

    function addBotMessage(answer, sources) {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = "message bot-message";
        div.textContent = answer;

        if (sources && sources.length > 0) {
            const src = document.createElement("div");
            src.className = "sources";
            src.textContent = "📚 Sources: " + sources.join(", ");
            div.appendChild(src);
        }

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeMessage(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }
</script>
</body>
</html>
